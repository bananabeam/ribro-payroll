<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIBRO Inc. Ledger Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-black text-white min-h-screen">

    <div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8 space-y-6">
        
        <div id="adminDeductionFormWrapper" class="bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-2xl max-w-md mx-auto">
            <h2 class="text-base font-bold text-white tracking-wide mb-4 flex items-center gap-2">
                <i data-lucide="shield-alert" class="w-5 h-5 text-red-500"></i> Impose System Penalty
            </h2>
            
            <form id="deductionForm" onsubmit="handleImposeDeduction(event)" class="space-y-4">
                
                <div>
                    <label class="block text-[10px] font-bold uppercase text-gray-400 mb-1">Select Target Referee Member(s)</label>
                    <div class="relative">
                        <button type="button" onclick="toggleDeductionUserDropdown()" id="deductionDropdownBtn" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-3 py-2.5 text-xs text-white text-left flex items-center justify-between focus:outline-none focus:border-red-500 transition-all">
                            <span id="selectedUsersText" class="truncate text-gray-400">Choose members...</span>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-gray-500 pointer-events-none"></i>
                        </button>

                        <div id="deductionUserDropdownMenu" class="hidden absolute left-0 right-0 mt-1.5 bg-gray-950 border border-gray-800 rounded-xl shadow-2xl z-50 max-h-48 overflow-y-auto p-2 space-y-1">
                            <p class="text-[11px] text-gray-500 text-center py-2">No active users loaded...</p>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase text-gray-400 mb-1">Deduction Reason</label>
                    <input type="text" id="deductionReason" required placeholder="e.g., Late arrival / Uniform failure" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-red-500 placeholder-gray-600">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold uppercase text-gray-400 mb-1">Penalty Amount ($)</label>
                        <input type="number" step="0.01" id="deductionAmount" required placeholder="0.00" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-red-500 placeholder-gray-600">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase text-gray-400 mb-1">Target Assessment Date</label>
                        <input type="date" id="deductionDate" required class="w-full bg-gray-950 border border-gray-800 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-red-500">
                    </div>
                </div>

                <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white rounded-xl py-2.5 text-xs font-bold transition-all mt-2 shadow-lg shadow-red-900/20">
                    Confirm Mass Deduction Matrix
                </button>
            </form>
        </div>

    </div>

    <script>
        // Initialization Layer
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            
            // Mock initialization data (Replace with your actual fetch call from /api/users)
            const mockUsers = [
                { username: 'John Doe' },
                { username: 'Alex Smith' },
                { username: 'Marcus Vance' },
                { username: 'David K.' }
            ];
            populateDeductionUserCheckboxes(mockUsers);
        });

        // Toggle custom dropdown overlay
        function toggleDeductionUserDropdown() {
            const menu = document.getElementById('deductionUserDropdownMenu');
            menu.classList.toggle('hidden');
        }

        // Dynamically append selection checkboxes into view context matrix
        function populateDeductionUserCheckboxes(users) {
            const container = document.getElementById('deductionUserDropdownMenu');
            if(!users || users.length === 0) return;

            container.innerHTML = users.map(user => `
                <label class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg hover:bg-gray-900 cursor-pointer text-xs group transition-all">
                    <input type="checkbox" name="targetReferees" value="${user.username}" onchange="updateSelectedUsersCounter()" class="accent-red-500 rounded border-gray-800 bg-black w-4 h-4">
                    <span class="text-gray-400 group-hover:text-white transition-colors">${user.username}</span>
                </label>
            `).join('');
        }

        // Keep metric tracking labels synchronized with checklist array parameters
        function updateSelectedUsersCounter() {
            const checkedBoxes = document.querySelectorAll('input[name="targetReferees"]:checked');
            const displayBtnText = document.getElementById('selectedUsersText');
            
            if (checkedBoxes.length === 0) {
                displayBtnText.innerText = "Choose members...";
                displayBtnText.classList.add('text-gray-400');
            } else if (checkedBoxes.length === 1) {
                displayBtnText.innerText = checkedBoxes[0].value;
                displayBtnText.classList.remove('text-gray-400');
            } else {
                displayBtnText.innerText = `${checkedBoxes.length} Referees Selected`;
                displayBtnText.classList.remove('text-gray-400');
            }
        }

        // Global dismiss framework outside targeting parameters
        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('deductionUserDropdownMenu');
            const button = document.getElementById('deductionDropdownBtn');
            if (button && dropdown && !button.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.classList.add('hidden');
            }
        });

        // Form pipeline controller submission method to backend endpoint array matrix
        async function handleImposeDeduction(event) {
            event.preventDefault();

            const checkedBoxes = document.querySelectorAll('input[name="targetReferees"]:checked');
            const selectedNames = Array.from(checkedBoxes).map(cb => cb.value);

            if (selectedNames.length === 0) {
                alert("Operational Error: You must select at least one target referee member.");
                return;
            }

            const payload = {
                names: selectedNames,
                reason: document.getElementById('deductionReason').value,
                amount: document.getElementById('deductionAmount').value,
                date: document.getElementById('deductionDate').value
            };

            try {
                const response = await fetch('/api/deductions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("Success: Batch transaction records written over targets.");
                    document.getElementById('deductionForm').reset();
                    updateSelectedUsersCounter();
                    document.getElementById('deductionUserDropdownMenu').classList.add('hidden');
                } else {
                    const failData = await response.json();
                    alert(`Submission failed: ${failData.error}`);
                }
            } catch (error) {
                console.error("Critical communications execution pipeline failure:", error);
                alert("Network error: Failed to reach backend transaction engine.");
            }
        }
    </script>
</body>
</html>
